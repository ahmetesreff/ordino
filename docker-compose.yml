version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: ordino_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ordino_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ordino_password}
      POSTGRES_DB: ${POSTGRES_DB:-ordino_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ordino_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ordino_admin} -d ${POSTGRES_DB:-ordino_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    container_name: ordino_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ordino_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-service:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ordino_api
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ordino_admin}:${POSTGRES_PASSWORD:-ordino_password}@postgres-db:5432/${POSTGRES_DB:-ordino_db}?schema=public
      - REDIS_URL=redis://redis-cache:6379
      - JWT_SECRET=${JWT_SECRET:-ordino_dev_secret_change_in_production}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - ordino_network

  admin-frontend:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: ordino_admin_web
    restart: unless-stopped
    depends_on:
      - api-service
    ports:
      - "3001:3000"
    networks:
      - ordino_network

  buyer-frontend:
    build:
      context: .
      dockerfile: apps/buyer-web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: ordino_buyer_web
    restart: unless-stopped
    depends_on:
      - api-service
    ports:
      - "3002:3000"
    networks:
      - ordino_network

  seller-frontend:
    build:
      context: .
      dockerfile: apps/seller-web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: ordino_seller_web
    restart: unless-stopped
    depends_on:
      - api-service
    ports:
      - "3003:3000"
    networks:
      - ordino_network

volumes:
  postgres_data:
  redis_data:

networks:
  ordino_network:
    driver: bridge
